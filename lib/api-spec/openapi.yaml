openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ZapAuto MRP Bot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: whatsapp
    description: WhatsApp connection management
  - name: whitelist
    description: Whitelist management
  - name: history
    description: Query history
  - name: config
    description: System configuration
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /whatsapp/status:
    get:
      operationId: getWhatsappStatus
      tags: [whatsapp]
      summary: Get WhatsApp connection status
      responses:
        "200":
          description: Status info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappStatus"

  /whatsapp/qr:
    get:
      operationId: getWhatsappQr
      tags: [whatsapp]
      summary: Get QR code as base64 PNG
      responses:
        "200":
          description: QR code image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrResponse"
        "404":
          description: QR not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /whatsapp/connect:
    post:
      operationId: connectWhatsapp
      tags: [whatsapp]
      summary: Start WhatsApp connection
      responses:
        "200":
          description: Connection started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /whatsapp/disconnect:
    post:
      operationId: disconnectWhatsapp
      tags: [whatsapp]
      summary: Disconnect WhatsApp
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /whitelist:
    get:
      operationId: listWhitelist
      tags: [whitelist]
      summary: List all whitelist contacts
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WhitelistContact"
    post:
      operationId: addWhitelistContact
      tags: [whitelist]
      summary: Add contact to whitelist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWhitelistContact"
      responses:
        "200":
          description: Contact added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhitelistContact"

  /whitelist/{id}:
    delete:
      operationId: deleteWhitelistContact
      tags: [whitelist]
      summary: Remove contact from whitelist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
    patch:
      operationId: updateWhitelistContact
      tags: [whitelist]
      summary: Toggle active status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWhitelistContact"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhitelistContact"

  /history:
    get:
      operationId: listHistory
      tags: [history]
      summary: List query history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: phone
          in: query
          schema:
            type: string
      responses:
        "200":
          description: History entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"

  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get system config
      responses:
        "200":
          description: Config values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemConfig"
    put:
      operationId: updateConfig
      tags: [config]
      summary: Update system config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemConfig"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemConfig"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
      required:
        - ok

    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
      required:
        - ok
        - error

    WhatsappStatus:
      type: object
      properties:
        connected:
          type: boolean
        status:
          type: string
        number:
          type: string
          nullable: true
      required:
        - connected
        - status

    QrResponse:
      type: object
      properties:
        qr:
          type: string
      required:
        - qr

    WhitelistContact:
      type: object
      properties:
        id:
          type: integer
        phone:
          type: string
        name:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - phone
        - name
        - active
        - createdAt

    CreateWhitelistContact:
      type: object
      properties:
        phone:
          type: string
        name:
          type: string
      required:
        - phone
        - name

    UpdateWhitelistContact:
      type: object
      properties:
        active:
          type: boolean
        name:
          type: string

    HistoryEntry:
      type: object
      properties:
        id:
          type: integer
        phone:
          type: string
        type:
          type: string
        query:
          type: string
        found:
          type: boolean
        response:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - phone
        - type
        - query
        - found
        - response
        - createdAt

    SystemConfig:
      type: object
      properties:
        autoRespond:
          type: boolean
        respondToGroups:
          type: boolean
        maxDailyMessages:
          type: integer
        welcomeMessage:
          type: string
      required:
        - autoRespond
        - respondToGroups
        - maxDailyMessages
        - welcomeMessage
